version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: merged
        columns:
          - name: ride_id
            tests:
              - not_null
          - name: rideable_type
            tests:
              - not_null
          - name: started_at
            tests:
              - not_null
      - name: weather_daily
        columns:
          - name: weather_date
            tests:
              - not_null
          - name: temperature_2m_mean
            tests:
              - not_null
          - name: precipitation_sum
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: ">= 0"
          - name: rain_sum
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: ">= 0"
          - name: snowfall_sum
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: ">= 0"
          - name: weather_code
            tests:
              - not_null

models:
  - name: stg_divvy_rides
    columns:
      - name: ride_id
        tests:
          - not_null
      - name: rideable_type_code
        tests:
          - not_null
          - accepted_values:
              values: [1, 2]

  - name: stg_weather_daily

  - name: mart_rides_weekly
    columns:
      - name: rides
        tests:
          - not_null
      - name: rides_lastweek
        tests:
          - not_null
      - name: rides_2weeks_ago
        tests:
          - not_null

  - name: mart_rides_monthly
    columns:
      - name: rides
        tests:
          - not_null
      - name: rides_lastmonth
        tests:
          - not_null
      - name: rides_2months_ago
        tests:
          - not_null

  - name: mart_rides_daily
    columns:
      - name: rides
        tests:
          - not_null
      - name: rides_lastday
        tests:
          - not_null
